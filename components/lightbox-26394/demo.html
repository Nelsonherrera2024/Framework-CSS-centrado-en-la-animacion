<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Image Trigger -->
  <a href="#img-modal">
    <img src="placeholder.jpg" alt="Gallery Image" class="lightbox-trigger" width="300">
  </a>

  <!-- Lightbox Modal -->
  <div id="img-modal" class="lightbox-modal">
    <a href="#" class="close-lightbox">&times;</a>
    <img src="placeholder.jpg" alt="Zoomed" class="lightbox-content">
  </div>

</body>
</html>
