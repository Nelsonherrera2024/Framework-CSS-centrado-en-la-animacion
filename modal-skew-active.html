<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skew‑Active Modal Demo</title>
  <link rel="stylesheet" href="modal-skew-active.css" />
</head>
<body>
  <!-- Trigger (checkbox hack) -->
  <input type="checkbox" id="modal-toggle" class="modal-toggle" />
  <label for="modal-toggle" class="open-btn">Open Modal</label>

  <div class="modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Skew‑Active Modal</h2>
      <p>This is a pure‑CSS animated modal using a skew‑active transition.</p>
      <label for="modal-toggle" class="close-btn" aria-label="Close modal">✕</label>
    </div>
  </div>
</body>
</html>
