name: Test and Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'submissions/examples/react-showcase/**'
  pull_request:
    paths:
      - 'submissions/examples/react-showcase/**'

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Stylelint
        run: npm run lint

      - name: Run Duplicate Linter
        run: npm run lint:duplicates

      - name: Run Smoke Tests
        run: npm test

  react-showcase-tests:
    name: React Showcase — Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: submissions/examples/react-showcase/package-lock.json

      - name: Install showcase dependencies
        working-directory: submissions/examples/react-showcase
        run: npm ci

      - name: Run React showcase tests
        working-directory: submissions/examples/react-showcase
        run: npm test

