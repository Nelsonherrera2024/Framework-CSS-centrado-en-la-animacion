name: Surgical Folder Purge

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  purge-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete Asterisk Folders
        run: |
          echo "Purging forbidden directories..."
          rm -rf submissions/examples/phase-351-*
          rm -rf submissions/examples/phase-352-*
          rm -rf submissions/examples/phase-353-*
          rm -rf submissions/examples/phase-354-*
          
      - name: Commit and Push Changes Directly
        run: |
          git config --global user.name "Ishwinder Kaur"
          git config --global user.email "ishwinderkaur.dev@gmail.com"
          git add submissions/examples/
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "fix: remove invalid directory paths from git index"
            git push origin main
          else
            echo "No changes detected to push."
          fi
