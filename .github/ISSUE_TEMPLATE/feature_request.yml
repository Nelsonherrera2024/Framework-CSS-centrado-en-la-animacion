name: "✨ Feature Request"
description: Propose a new utility, animation, or component for EaseMotion CSS
title: "[FEATURE] "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new animation, utility, or component? Fill out the fields below.
        Tip: you can discuss ideas first on our [Discord Server](https://discord.gg/hWSdGrccBU).

  - type: input
    id: feature-name
    attributes:
      label: Feature name
      description: A short, descriptive name for your proposed feature.
      placeholder: e.g. "Hover Shimmer Effect"
    validations:
      required: true

  - type: dropdown
    id: animation-category
    attributes:
      label: Animation category
      description: Which category best describes this proposal?
      options:
        - Hover effect
        - Entrance / exit animation
        - Scroll-triggered animation
        - Loading / skeleton state
        - Button / interactive component
        - Layout / utility (non-animation)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the effect or utility you are proposing. What does it look like? What does it do?
    validations:
      required: true

  - type: textarea
    id: why-useful
    attributes:
      label: Why is this useful for EaseMotion CSS?
      description: Explain how this fits the EaseMotion CSS design philosophy — human-readable, animation-first, composable.
    validations:
      required: true

  - type: textarea
    id: html-snippet
    attributes:
      label: HTML snippet
      description: Show exactly how a developer would use this in their HTML.
      render: html
    validations:
      required: true

  - type: textarea
    id: css-snippet
    attributes:
      label: CSS snippet
      description: Paste your raw CSS. You do NOT need to use ease- naming yet — the maintainer handles that.
      render: css
    validations:
      required: true

  - type: input
    id: visual-reference
    attributes:
      label: Visual reference (optional)
      description: Link a screenshot, GIF, CodePen, or video showing the effect.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This feature does not duplicate an existing EaseMotion CSS class
          required: true
        - label: I understand my naming will be standardized by the maintainer
          required: true
        - label: I will submit code inside submissions/examples/ only — not in core/ or components/
          required: true
