<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Glow Buttons</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Neon Glow Buttons</h1>
      <p>Hover for neon glow effects &bull; Pure CSS</p>
    </header>
    <div class="btn-grid">
      <button class="btn btn-blue">Indigo</button>
      <button class="btn btn-pink">Pink</button>
      <button class="btn btn-green">Green</button>
      <button class="btn btn-amber">Amber</button>
      <button class="btn btn-blue btn-pulse">Pulse Glow</button>
      <button class="btn btn-pink btn-pulse-pink">Pulse Pink</button>
      <button class="btn btn-blue btn-fill btn-fill-blue">Fill Hover</button>
    </div>
  </div>
</body>
</html>
