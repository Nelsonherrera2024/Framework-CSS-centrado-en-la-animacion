<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS File Tree</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="file-tree">
    <details class="file-tree__folder" open>
      <summary class="file-tree__label">src/</summary>
      <details class="file-tree__folder">
        <summary class="file-tree__label">components/</summary>
        <div class="file-tree__file">Header.jsx</div>
        <div class="file-tree__file">Footer.jsx</div>
      </details>
      <div class="file-tree__file">index.js</div>
    </details>
  </div>
</body>
</html>
