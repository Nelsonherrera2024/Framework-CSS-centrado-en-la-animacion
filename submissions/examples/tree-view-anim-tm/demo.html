<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree View</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>File Tree</h1>
    <ul class="ease-tree">
      <li><span>src</span>
        <ul>
          <li><span>components</span>
            <ul>
              <li>Button.js</li>
              <li>Modal.js</li>
            </ul>
          </li>
          <li>App.js</li>
          <li>index.js</li>
        </ul>
      </li>
      <li><span>public</span>
        <ul>
          <li>index.html</li>
          <li>favicon.ico</li>
        </ul>
      </li>
    </ul>
  </div>
  <script>
    document.querySelectorAll('.ease-tree li > span').forEach(s => {
      s.addEventListener('click', () => s.parentElement.classList.toggle('ease-tree-open'));
    });
    document.querySelectorAll('.ease-tree li:has(ul)').forEach(li => li.classList.add('ease-tree-open'));
  </script>
</body>
</html>
