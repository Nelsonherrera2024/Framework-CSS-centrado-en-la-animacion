<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-meditation-breathing-circle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Guided Breathing Exercise</h1>

    <div class="breathing-wrapper">

        <div class="breathing-circle">
            <span id="breathText">Breathe In</span>
        </div>

    </div>

    <div class="info-card">
        <h3>Meditation Session</h3>
        <p>
            Follow the breathing circle. Expand while breathing in,
            contract while breathing out.
        </p>
    </div>

</div>

<script>
const text = document.getElementById("breathText");

function cycleText() {
    text.textContent = "Breathe In";

    setTimeout(() => {
        text.textContent = "Breathe Out";
    }, 3000);
}

cycleText();
setInterval(cycleText, 6000);
</script>

</body>
</html>
