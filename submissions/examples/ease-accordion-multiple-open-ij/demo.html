<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Multiple Open</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="accordion-preview">
    <h2>Accordion <small>multiple panels</small></h2>
    <div class="accordion">
      <div class="accordion-panel">
        <input type="checkbox" id="p1" checked>
        <label for="p1" class="accordion-header">Panel One</label>
        <div class="accordion-body"><p>Content for panel one. Lorem ipsum dolor sit amet.</p></div>
      </div>
      <div class="accordion-panel">
        <input type="checkbox" id="p2">
        <label for="p2" class="accordion-header">Panel Two</label>
        <div class="accordion-body"><p>Content for panel two. Consectetur adipiscing elit.</p></div>
      </div>
      <div class="accordion-panel">
        <input type="checkbox" id="p3">
        <label for="p3" class="accordion-header">Panel Three</label>
        <div class="accordion-body"><p>Content for panel three. Sed do eiusmod tempor.</p></div>
      </div>
    </div>
  </div>
</body>
</html>
