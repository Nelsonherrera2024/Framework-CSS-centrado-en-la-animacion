<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Fill Mode States — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 4rem 1rem; margin: 0;">

  <div style="max-width: 700px; margin: 0 auto 2.5rem auto; text-align: center; font-family: sans-serif;">
    <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-weight: 800; font-size: 1.6rem;">Animation Fill Mode Monitor</h3>
    <p style="margin: 0; color: #475569; font-size: 1rem;">
      Trigger the timelines below. Notice if blocks snap back to blue or remain locked at the green endpoint when complete.
    </p>
  </div>

  <div class="ease-action-bar">
    <button class="ease-trigger-btn" onclick="restartTimelines()">Run Animation Timelines</button>
  </div>

  <div class="ease-timeline-grid" id="sandbox-grid">
    
    <div class="ease-timeline-card">
      <div>
        <h4 style="margin: 0; font-size: 1rem; color: #0f172a;">Reset Layout (None)</h4>
        <code style="font-size: 0.8rem; color: #64748b;">.ease-animation-fill-none</code>
      </div>
      <div class="ease-track-lane">
        <div class="ease-animated-runner ease-animation-fill-none"></div>
      </div>
    </div>

    <div class="ease-timeline-card">
      <div>
        <h4 style="margin: 0; font-size: 1rem; color: #0f172a;">Persistent Final (Forwards)</h4>
        <code style="font-size: 0.8rem; color: #2563eb;">.ease-animation-fill-forwards</code>
      </div>
      <div class="ease-track-lane">
        <div class="ease-animated-runner ease-animation-fill-forwards"></div>
      </div>
    </div>

  </div>

  <script>
    function restartTimelines() {
      const grid = document.getElementById('sandbox-grid');
      grid.classList.remove('active');
      
      // Force layout recalculation loop to cleanly restart CSS keyframes
      void grid.offsetWidth; 
      
      grid.classList.add('active');
    }
  </script>

</body>
</html>
