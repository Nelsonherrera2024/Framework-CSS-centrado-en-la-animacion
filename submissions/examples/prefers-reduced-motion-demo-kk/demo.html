<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prefers-Reduced-Motion Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-card">
    <h1 class="animated-heading">Accessibility Matters</h1>
    <p class="description">
      This demo illustrates how to respect the <code>prefers-reduced-motion</code> setting.
      If you enable "Reduce motion" in your system settings, these animations will gracefully stop.
    </p>

    <div class="examples-container">
      <div class="example-box fade">
        <h2>Fade</h2>
        <p>I gently fade in and out.</p>
      </div>

      <div class="example-box slide">
        <h2>Slide</h2>
        <p>I smoothly slide back and forth.</p>
      </div>

      <div class="example-box pulse">
        <h2>Pulse</h2>
        <p>I softly pulse in scale.</p>
      </div>
    </div>
  </div>
</body>
</html>
