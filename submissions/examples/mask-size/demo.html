<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mask Size Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item mask-auto">.mask-auto</div>
  <div class="demo-item mask-cover">.mask-cover</div>
  <div class="demo-item mask-contain">.mask-contain</div>
  <div class="demo-item mask-100">.mask-100</div>
  <div class="demo-item mask-50">.mask-50</div>
  <div class="demo-item mask-25">.mask-25</div>
</body>
</html>
