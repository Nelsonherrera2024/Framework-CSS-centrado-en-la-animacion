<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Procurement Optimization Workspace - Phase 22</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cognitive-grid"></div>
  <div class="ambient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-text">COGNITIVE // 22</span></div>
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="#workspace" class="nav-item active">Intelligent Workspace</a>
        <a href="#analytics" class="nav-item">Telemetry</a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>Active Orchestrator</span>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <span class="badge-tag">Phase 22</span>
          <h1>AI Procurement Optimization Workspace</h1>
        </div>
      </header>
      
      <section class="workspace-section" id="workspace">
        <div class="procure-container">
  <h2>AI-Suggested Orders</h2>
  <div class="orders-grid">
    <div class="order-card">
      <div class="card-title">Bulk Memory Modules</div>
      <div class="card-details">
        <span>Vendor: TechSupply</span>
        <span>Cost: $12,400 <strong class="discount">-15% AI Negotiated</strong></span>
      </div>
      <button class="approve-btn">Approve Order</button>
    </div>
    <div class="order-card">
      <div class="card-title">SSD Storage Units</div>
      <div class="card-details">
        <span>Vendor: CoreData</span>
        <span>Cost: $8,900 <strong class="discount">-10% AI Negotiated</strong></span>
      </div>
      <button class="approve-btn">Approve Order</button>
    </div>
  </div>
</div>
      </section>
    </main>
  </div>
  <script>
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });
  </script>
</body>
</html>
