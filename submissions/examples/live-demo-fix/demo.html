<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Demo Link Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
        }
        h1 { text-align: center; }
        .code-section {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Live Demo Link Fix</h1>
        <div class="success">✅ Solution: Update to GitHub Pages URL</div>
        <div class="code-section">
            <h2>❌ Broken Link</h2>
            <pre>https://github.com/.../blob/main/examples/demo.html</pre>
        </div>
        <div class="code-section">
            <h2>✅ Fixed Link</h2>
            <pre>https://saptarshi-coder.github.io/EaseMotion-css/demo.html</pre>
        </div>
    </div>
</body>
</html>
