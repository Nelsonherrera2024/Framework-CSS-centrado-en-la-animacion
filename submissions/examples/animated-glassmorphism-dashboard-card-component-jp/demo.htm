<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Glassmorphism Dashboard Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard-container">

    <div class="glass-card">
        <div class="card-icon">📊</div>
        <h2>Total Revenue</h2>
        <h1>$48,950</h1>
        <p>+12% increase from last month</p>
    </div>

    <div class="glass-card">
        <div class="card-icon">👥</div>
        <h2>Active Users</h2>
        <h1>8,245</h1>
        <p>+8% increase from last week</p>
    </div>

    <div class="glass-card">
        <div class="card-icon">🚀</div>
        <h2>Projects</h2>
        <h1>142</h1>
        <p>15 new projects this month</p>
    </div>

</div>

</body>
</html>
