<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Click Bounce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Elastic Click Bounce</h1>
    <p>
        Click any element below to see a satisfying elastic bounce animation
        built entirely with CSS.
    </p>
</header>

<main class="container">

    <button class="elastic-click purple">
        Save Changes
    </button>

    <button class="elastic-click blue">
        Download
    </button>

    <button class="elastic-click green">
        Continue
    </button>

    <button class="elastic-click orange">
        Subscribe
    </button>

    <div class="card elastic-click">
        <h2>Interactive Card</h2>
        <p>Cards can also use the elastic click effect.</p>
    </div>

    <div class="icon-row">
        <div class="icon elastic-click">❤️</div>
        <div class="icon elastic-click">⭐</div>
        <div class="icon elastic-click">🚀</div>
        <div class="icon elastic-click">🎯</div>
    </div>

</main>

</body>
</html>
