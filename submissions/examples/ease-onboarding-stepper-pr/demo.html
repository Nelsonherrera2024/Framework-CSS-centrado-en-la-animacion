<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Onboarding Stepper</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="ease-onboarding-stepper">

    <div class="step completed">
      <div class="step-circle">✓</div>
      <span class="step-label">Create Account</span>
    </div>

    <div class="step active">
      <div class="step-circle">2</div>
      <span class="step-label">Profile Setup</span>
    </div>

    <div class="step">
      <div class="step-circle">3</div>
      <span class="step-label">Choose Plan</span>
    </div>

    <div class="step">
      <div class="step-circle">4</div>
      <span class="step-label">Launch</span>
    </div>

  </div>

</body>

</html>
