<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Animated Button Variants</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Interactive Animated Button Variants</h1>
    <p class="subtitle">
        Modern CSS animated buttons for EaseMotion CSS
    </p>

    <div class="buttons">

        <button class="btn ripple">
            <span>Ripple Button</span>
        </button>

        <button class="btn shimmer">
            <span>Shimmer Hover</span>
        </button>

        <button class="btn magnetic">
            <span>Magnetic Hover</span>
        </button>

        <button class="btn neon">
            <span>Neon Glow</span>
        </button>

        <button class="btn liquid">
            <span>Liquid Fill</span>
        </button>

    </div>
</div>

</body>
</html>
