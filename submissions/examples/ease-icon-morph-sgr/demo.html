<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Morph - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1 class="demo-title">Interactive Icon Morphing</h1>
      <p class="demo-subtitle">
        Vector shapes morph smoothly into new icons using transition-ready SVG
        path definitions driven by CSS state classes.
      </p>

      <!-- Controls Showcase Panel -->
      <div class="control-card">
        <div class="showcase-row">
          <!-- Icon 1: Play/Pause -->
          <div class="control-item">
            <span class="control-label">Play / Pause</span>
            <button class="morph-btn morph-btn-primary" id="btn-play-pause">
              <svg
                class="morph-icon morph-icon-filled morph-play-pause"
                viewBox="0 0 100 100"
              >
                <path
                  class="path-left"
                  d="M 25 15 L 55 32.5 L 55 67.5 L 25 85 Z"
                />
                <path
                  class="path-right"
                  d="M 55 32.5 L 85 50 L 85 50 L 55 67.5 Z"
                />
              </svg>
            </button>
          </div>

          <!-- Icon 2: Menu/Close -->
          <div class="control-item">
            <span class="control-label">Menu / Close</span>
            <button class="morph-btn" id="btn-menu-close">
              <svg class="morph-icon morph-menu-close" viewBox="0 0 100 100">
                <path class="path-top" d="M 15 25 L 85 25" />
                <path class="path-mid" d="M 15 50 L 85 50" />
                <path class="path-bot" d="M 15 75 L 85 75" />
              </svg>
            </button>
          </div>

          <!-- Icon 3: Plus/Minus -->
          <div class="control-item">
            <span class="control-label">Plus / Minus</span>
            <button class="morph-btn" id="btn-plus-minus">
              <svg class="morph-icon morph-plus-minus" viewBox="0 0 100 100">
                <path class="path-horiz" d="M 15 50 L 85 50" />
                <path class="path-vert" d="M 50 15 L 50 85" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Interactive Morph Toggler Script -->
    <script>
      const morphButtons = document.querySelectorAll(".morph-btn");

      morphButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          // Toggle the active class to trigger the path morphs
          btn.classList.toggle("is-active");
        });
      });
    </script>
  </body>
</html>
