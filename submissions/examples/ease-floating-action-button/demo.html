<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Floating Action Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- FAB Component -->
  <div class="ease-fab-container">
    
    <!-- Hidden checkbox to handle state -->
    <input type="checkbox" id="fab-toggle" class="ease-fab-toggle">
    
    <!-- Main Button -->
    <label for="fab-toggle" class="ease-fab-main" aria-label="Toggle Menu">
      <span class="ease-fab-icon">+</span>
    </label>

    <!-- Expanded Menu -->
    <!-- Custom property --item-index controls the staggered animation delay -->
    <div class="ease-fab-menu" role="menu">
      <button class="ease-fab-item" style="--item-index: 1;" data-tooltip="Write Message" aria-label="Write Message">
        ✎
      </button>
      <button class="ease-fab-item" style="--item-index: 2;" data-tooltip="Upload File" aria-label="Upload File">
        ↑
      </button>
      <button class="ease-fab-item" style="--item-index: 3;" data-tooltip="Create Folder" aria-label="Create Folder">
        📁
      </button>
    </div>

  </div>

</body>
</html>
