<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Indent Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item indent-0">.indent-0</div>
  <div class="demo-item indent-1">.indent-1</div>
  <div class="demo-item indent-2">.indent-2</div>
  <div class="demo-item indent-4">.indent-4</div>
  <div class="demo-item indent-8">.indent-8</div>
  <div class="demo-item indent-16">.indent-16</div>
</body>
</html>
