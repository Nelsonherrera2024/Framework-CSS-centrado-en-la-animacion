<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invert Filter Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 80vh;">

  <div class="showcase-card">
    <div class="image-box">
      🔑 Icon/Logo
    </div>
    <div class="info-box">
      <h3>Invert Filter</h3>
      <p>Hover over this card. The icon area will invert colors dynamically using <code>.ease-filter-invert</code>.</p>
    </div>
  </div>

</body>
</html>
