<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Width Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item border-0">.border-0</div>
  <div class="demo-item border">.border</div>
  <div class="demo-item border-2">.border-2</div>
  <div class="demo-item border-4">.border-4</div>
  <div class="demo-item border-8">.border-8</div>
  <div class="demo-item border-t-0">.border-t-0</div>
</body>
</html>
