<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Startup Animation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="terminal">

        <header class="terminal-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <h1>Linux Startup Animation</h1>
        </header>

        <section class="penguin">

            <div class="head">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="beak"></div>
            </div>

            <div class="body">
                <div class="belly"></div>
            </div>

            <div class="feet">
                <span></span>
                <span></span>
            </div>

        </section>

        <section class="boot-screen">

            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>

            <div class="boot-messages">

                <p class="msg msg1">[ OK ] Initializing Linux Kernel...</p>

                <p class="msg msg2">[ OK ] Mounting File System...</p>

                <p class="msg msg3">[ OK ] Starting Network Manager...</p>

                <p class="msg msg4">[ OK ] Loading Device Drivers...</p>

                <p class="msg msg5">[ OK ] Starting Display Manager...</p>

                <p class="msg msg6">[ OK ] Boot Completed Successfully.</p>

            </div>

            <div class="login">
    <span>user@linux:~$ </span>
    <span class="cursor"></span>
</div>

        </section>

    </main>

</body>
</html>
