<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inherited Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item inherit-all">.inherit-all</div>
  <div class="demo-item inherit-none">.inherit-none</div>
  <div class="demo-item inherit-initial">.inherit-initial</div>
  <div class="demo-item inherit-revert">.inherit-revert</div>
  <div class="demo-item inherit-revert-layers">.inherit-revert-layers</div>
  <div class="demo-item inherit-normal">.inherit-normal</div>
</body>
</html>
