<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Template Rows Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item grid-rows-none">.grid-rows-none</div>
  <div class="demo-item grid-rows-1">.grid-rows-1</div>
  <div class="demo-item grid-rows-2">.grid-rows-2</div>
  <div class="demo-item grid-rows-3">.grid-rows-3</div>
  <div class="demo-item grid-rows-4">.grid-rows-4</div>
  <div class="demo-item grid-rows-5">.grid-rows-5</div>
</body>
</html>
