<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Goal Dashboard Showcase — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 6rem 1rem; margin: 0;">

  <div class="ease-goal-card">
    <h3 style="margin: 0; color: #0f172a; font-weight: 800; font-size: 1.4rem;">Q2 Performance Objective</h3>
    <p style="margin: 0.25rem 0 0 0; color: #64748b; font-size: 0.85rem;">Interactive Milestone Acceleration</p>

    <div class="ease-gauge-holder">
      <svg width="100" height="100" class="ease-progress-ring">
        <circle stroke="#e2e8f0" stroke-width="8" fill="transparent" r="40" cx="50" cy="50"/>
        <circle class="ease-progress-ring-circle" stroke="#2563eb" stroke-width="8" stroke-linecap="round" fill="transparent" r="40" cx="50" cy="50"/>
      </svg>
      <div class="ease-gauge-label">0%</div>
    </div>

    <div class="ease-metric-strip">
      <div class="ease-stat-pill active" onclick="setGoal(35, this)">
        <span style="display:block; font-size:0.75rem; color:#64748b; font-weight:600; text-transform:uppercase;">Phase 1</span>
        <span style="font-size:1.1rem; font-weight:700; color:#2563eb;">35%</span>
      </div>
      <div class="ease-stat-pill" onclick="setGoal(70, this)">
        <span style="display:block; font-size:0.75rem; color:#64748b; font-weight:600; text-transform:uppercase;">Phase 2</span>
        <span style="font-size:1.1rem; font-weight:700; color:#2563eb;">70%</span>
      </div>
      <div class="ease-stat-pill" onclick="setGoal(100, this)">
        <span style="display:block; font-size:0.75rem; color:#64748b; font-weight:600; text-transform:uppercase;">Target</span>
        <span style="font-size:1.1rem; font-weight:700; color:#10b981;">100%</span>
      </div>
    </div>

  </div>

  <script>
    const circle = document.querySelector('.ease-progress-ring-circle');
    const label = document.querySelector('.ease-gauge-label');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;

    function setGoal(percent, element) {
      // Manage active states
      document.querySelectorAll('.ease-stat-pill').forEach(p => p.classList.remove('active'));
      element.classList.add('active');

      // Animate SVG stroke
      const offset = circumference - (percent / 100) * circumference;
      circle.style.strokeDashoffset = offset;
      
      // Update color matching thresholds dynamically
      if (percent === 100) {
        circle.style.stroke = '#10b981';
      } else {
        circle.style.stroke = '#2563eb';
      }

      // Smooth count-up labels
      let start = parseInt(label.textContent) || 0;
      const duration = 400;
      const startTime = performance.now();

      function updateCounter(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const currentPercent = Math.floor(start + progress * (percent - start));
        label.textContent = `${currentPercent}%`;
        if (progress < 1) {
          requestAnimationFrame(updateCounter);
        }
      }
      requestAnimationFrame(updateCounter);
    }

    // Initialize baseline loop position
    setTimeout(() => {
      setGoal(35, document.querySelector('.ease-stat-pill'));
    }, 150);
  </script>

</body>
</html>
