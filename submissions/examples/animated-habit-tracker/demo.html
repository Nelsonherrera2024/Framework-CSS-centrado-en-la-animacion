<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Habit Streak Tracker — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 6rem 1rem; margin: 0;">

  <div class="ease-dashboard-deck">
    
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 1.25rem;">
      <div>
        <h3 style="margin: 0; color: #0f172a; font-weight: 800; font-size: 1.35rem;">Daily Coding Run</h3>
        <p style="margin: 0.25rem 0 0 0; color: #64748b; font-size: 0.85rem;">Consistency Engine Protocol</p>
      </div>
      <div class="ease-streak-badge">
        <span>🔥</span>
        <span>24 Days</span>
      </div>
    </div>

    <div style="margin-top: 1.75rem;">
      <span style="font-size: 0.8rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.05em;">Weekly Milestone Progress</span>
      
      <div class="ease-calendar-strip">
        <div class="ease-day-node"><span class="ease-day-label">Mon</span><input type="checkbox" class="ease-day-checkbox" checked /></div>
        <div class="ease-day-node"><span class="ease-day-label">Tue</span><input type="checkbox" class="ease-day-checkbox" checked /></div>
        <div class="ease-day-node"><span class="ease-day-label">Wed</span><input type="checkbox" class="ease-day-checkbox" checked /></div>
        <div class="ease-day-node"><span class="ease-day-label">Thu</span><input type="checkbox" class="ease-day-checkbox" checked /></div>
        <div class="ease-day-node"><span class="ease-day-label">Fri</span><input type="checkbox" class="ease-day-checkbox" id="trigger-pop" /></div>
        <div class="ease-day-node"><span class="ease-day-label">Sat</span><input type="checkbox" class="ease-day-checkbox" /></div>
        <div class="ease-day-node"><span class="ease-day-label">Sun</span><input type="checkbox" class="ease-day-checkbox" /></div>
      </div>
    </div>

    <div style="margin-top: 1.5rem; background: #f8fafc; border-radius: 0.5rem; padding: 0.75rem; text-align: center; font-size: 0.85rem; color: #475569;">
      Click <strong>Fri</strong> or <strong>Sat</strong> nodes to check off activities and observe scaling transitions.
    </div>

  </div>

  <script>
    // Optional micro interaction layer to boost streak values on checked targets dynamically
    const targetNode = document.getElementById('trigger-pop');
    const displayBadge = document.querySelector('.ease-streak-badge span:last-child');
    targetNode.addEventListener('change', (e) => {
      if(e.target.checked) {
        displayBadge.textContent = '25 Days';
        displayBadge.style.color = '#10b981';
      } else {
        displayBadge.textContent = '24 Days';
        displayBadge.style.color = '#ea580c';
      }
    });
  </script>

</body>
</html>
