<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pixel feedback score card demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage" aria-label="pixel feedback score card demo">
    <article class="motion-panel">
      <div class="pulse-track" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <section class="copy">
        <p class="label">Score</p>
        <h1>pixel feedback score card</h1>
        <p>Recent customer pulse with a measured animation pattern that supports fast scanning.</p>
      </section>
      <aside class="metric" aria-label="Score metric">
        <span>4.8</span>
        <strong>Score</strong>
      </aside>
    </article>
  </main>
</body>
</html>
