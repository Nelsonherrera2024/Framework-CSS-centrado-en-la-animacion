<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Hover Spotlight Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>ease-hover-spotlight</h1>
        <p>Move your cursor over the card below.</p>

        <div class="spotlight-card">
            <h2>Premium Card</h2>
            <p>
                A spotlight effect follows the cursor to create
                an interactive lighting experience.
            </p>
        </div>
    </div>

    <script>
        const card = document.querySelector('.spotlight-card');

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            card.style.setProperty('--x', `${x}px`);
            card.style.setProperty('--y', `${y}px`);
        });
    </script>

</body>
</html>
