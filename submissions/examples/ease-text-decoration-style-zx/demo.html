<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Decoration Style Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Text Decoration Style</h1>
    <p class="note">Controls the line style of text decorations.</p>
    <div class="label">decoration-solid</div>
    <div class="demo-deco decoration-solid">Solid underline</div>
    <div class="label">decoration-double</div>
    <div class="demo-deco decoration-double">Double underline</div>
    <div class="label">decoration-dotted</div>
    <div class="demo-deco decoration-dotted">Dotted underline</div>
    <div class="label">decoration-dashed</div>
    <div class="demo-deco decoration-dashed">Dashed underline</div>
    <div class="label">decoration-wavy</div>
    <div class="demo-deco decoration-wavy">Wavy underline</div>
  </body>
</html>
