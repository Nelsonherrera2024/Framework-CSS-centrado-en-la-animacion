<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Line Height Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item leading-none">.leading-none</div>
  <div class="demo-item leading-tight">.leading-tight</div>
  <div class="demo-item leading-snug">.leading-snug</div>
  <div class="demo-item leading-normal">.leading-normal</div>
  <div class="demo-item leading-relaxed">.leading-relaxed</div>
  <div class="demo-item leading-loose">.leading-loose</div>
</body>
</html>
