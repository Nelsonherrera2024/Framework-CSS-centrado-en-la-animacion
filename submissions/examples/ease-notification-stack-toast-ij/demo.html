<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Notification Stack Toast</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='toast-bg')r.style.setProperty('--toast-bg',t.value);if(t.name==='toast-border')r.style.setProperty('--toast-border',t.value);if(t.name==='stack-gap')r.style.setProperty('--stack-gap',t.value+'px');if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.toast').forEach((t,i)=>{setTimeout(()=>t.classList.add('show'),i*200)})})</script>
<div class="container"><p class="title">Notification Stack Toast</p>
<div class="toast-stack"><div class="toast"><span class="toast-icon">&#10003;</span><span class="toast-msg">Changes saved successfully</span></div><div class="toast"><span class="toast-icon">&#9432;</span><span class="toast-msg">New message from User123</span></div><div class="toast"><span class="toast-icon">&#9888;</span><span class="toast-msg">Battery level is low</span></div></div>
<div class="controls"><label>BG: <input type="color" name="toast-bg" value="#2d2d44"></label><label>Border: <input type="color" name="toast-border" value="#4a4a6a"></label><label>Gap: <input type="range" name="stack-gap" min="0" max="20" value="8"></label><label>Speed: <input type="range" name="slide-duration" min="0.2" max="1" step="0.05" value="0.35"></label></div></div></body></html>
