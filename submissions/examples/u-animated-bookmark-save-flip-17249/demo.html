<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Bookmark Save Flip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Bookmark Save Flip</h1>

    <p>
      A reusable bookmark animation for reading apps,
      documentation websites, blogs, and productivity tools.
    </p>

    <div class="demo-grid">

      <button class="bookmark-button">
        <span class="bookmark-icon">🔖</span>
      </button>

      <button class="bookmark-button card-style">
        <span class="bookmark-icon">🔖</span>
        <span>Save Article</span>
      </button>

      <div class="bookmark-card">
        <h3>Reading List</h3>

        <p>
          Save this article and continue reading later.
        </p>

        <button class="bookmark-button small">
          <span class="bookmark-icon">🔖</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
