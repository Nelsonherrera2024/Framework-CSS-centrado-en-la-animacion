<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will Change Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }

  <link rel="stylesheet" href="style.css">

<body>
  <div class="demo-item will-change-auto">.will-change-auto</div>

  <div class="demo-item will-change-contents">.will-change-contents</div>
  <div class="demo-item will-change-transform">.will-change-transform</div>
