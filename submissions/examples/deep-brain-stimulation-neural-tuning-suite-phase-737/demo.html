<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Tuning Suite — Phase #737</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header fade-in">
    <div class="brand">
      <div class="brand-pulse"></div>
      NEURO_SYNC V2
    </div>
    <div class="patient-status">
      <div class="stat-box">
        <span class="stat-lbl">PATIENT ID</span>
        <span class="stat-val" style="color: var(--clr-text)">88-AX-9</span>
      </div>
      <div class="stat-box">
        <span class="stat-lbl">STIM STATUS</span>
        <span class="stat-val" style="color: var(--clr-accent-1)">ACTIVE</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Panel: Tuning Controls -->
    <aside class="panel panel-top slide-up delay-1">
      <div class="panel-title">Stimulation Parameters</div>
      
      <div class="tune-control">
        <div class="tune-header">
          <span>Frequency (Hz)</span>
          <span class="tune-val" style="color: var(--clr-accent-1)">130.5</span>
        </div>
        <div class="slider-track" tabindex="0" role="slider" aria-label="Frequency in hertz" aria-valuenow="130.5" aria-valuemin="0" aria-valuemax="200">
          <div class="slider-fill" style="width: 75%; background: var(--clr-accent-1);"></div>
          <div class="slider-thumb" style="left: 75%;"></div>
        </div>
      </div>

      <div class="tune-control">
        <div class="tune-header">
          <span>Pulse Width (μs)</span>
          <span class="tune-val">60.0</span>
        </div>
        <div class="slider-track" tabindex="0" role="slider" aria-label="Pulse width in microseconds" aria-valuenow="60" aria-valuemin="0" aria-valuemax="120">
          <div class="slider-fill" style="width: 45%;"></div>
          <div class="slider-thumb" style="left: 45%;"></div>
        </div>
      </div>

      <div class="tune-control">
        <div class="tune-header">
          <span>Amplitude (V)</span>
          <span class="tune-val" style="color: var(--clr-accent-3)">3.2</span>
        </div>
        <div class="slider-track" tabindex="0" role="slider" aria-label="Amplitude in volts" aria-valuenow="3.2" aria-valuemin="0" aria-valuemax="10">
          <div class="slider-fill" style="width: 60%; background: var(--clr-accent-3);"></div>
          <div class="slider-thumb" style="left: 60%;"></div>
        </div>
      </div>
    </aside>

    <!-- Center: Brain Map Visualizer -->
    <section class="panel panel-center slide-up delay-2" style="background: transparent; border: none; box-shadow: none;">
      <div class="brain-map">
        <div class="map-scan"></div>
        
        <!-- Electrodes -->
        <div class="electrode e-1" tabindex="0" role="button" aria-label="Electrode 1"></div>
        <div class="electrode e-2" tabindex="0" role="button" aria-label="Electrode 2"></div>
        <div class="electrode e-3" tabindex="0" role="button" aria-label="Electrode 3"></div>
        <div class="electrode e-4" tabindex="0" role="button" aria-label="Electrode 4"></div>
        <div class="electrode e-5 active" tabindex="0" role="button" aria-label="Electrode 5, active"></div>
        <div class="electrode e-6" tabindex="0" role="button" aria-label="Electrode 6"></div>
        <div class="electrode e-7" tabindex="0" role="button" aria-label="Electrode 7"></div>
        <div class="electrode e-8" tabindex="0" role="button" aria-label="Electrode 8"></div>
      </div>
    </section>

    <!-- Right Panel: Diagnostics -->
    <aside class="panel panel-right slide-up delay-3">
      <div class="panel-title">Real-time Diagnostics</div>
      
      <div class="diag-list">
        <div class="diag-card">
          <span class="diag-lbl">Impedance</span>
          <span class="diag-val" style="color: var(--clr-accent-1)">1.2 kΩ</span>
        </div>
        <div class="diag-card">
          <span class="diag-lbl">Battery Life</span>
          <span class="diag-val">84%</span>
        </div>
        <div class="diag-card is-flagged">
          <span class="diag-lbl">Sync Variance <span class="diag-flag">OUT OF RANGE</span></span>
          <span class="diag-val" style="color: var(--clr-accent-2)">+0.04 ms</span>
        </div>
        <div class="diag-card">
          <span class="diag-lbl">Mode</span>
          <span class="diag-val" style="color: var(--clr-text)">CYCLING</span>
        </div>
      </div>
    </aside>

    <!-- Bottom Panel: Oscilloscope -->
    <section class="panel panel-bottom slide-up delay-4">
      <div class="panel-title">Live EEG Telemetry</div>
      
      <div class="eeg-container">
        <!-- Morphing waveform lines (pure CSS clip-path animation) -->
        <div class="eeg-line theta"></div>
        <div class="eeg-line alpha"></div>
        <div class="eeg-line"></div>
      </div>
    </section>

  </main>

</body>
</html>
