<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position-try Fallbacks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="pt-container">
    <h1>position-try Fallbacks</h1>
    <div class="anchor-group">
      <div class="anchor-box" id="anchor-1">Anchor</div>
      <div class="popup ease-position-try" popover="manual" id="popup-1">I flip to stay visible!</div>
    </div>
    <button onclick="document.getElementById('popup-1').togglePopover()">Toggle Popup</button>
  </main>
</body>
</html>
