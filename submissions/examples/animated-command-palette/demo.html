<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Command Palette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="palette">

        <div class="search-box">

            <span class="search-icon">⌕</span>

            <input
                type="text"
                placeholder="Type a command or search..."
            >

            <span class="shortcut">
                Ctrl K
            </span>

        </div>

        <div class="command-group">

            <h4>Navigation</h4>

            <div class="command-item">
                <div class="left">
                    🏠 Home
                </div>

                <span class="badge">
                    H
                </span>
            </div>

            <div class="command-item">
                <div class="left">
                    📁 Projects
                </div>

                <span class="badge">
                    P
                </span>
            </div>

            <div class="command-item active">
                <div class="left">
                    📊 Dashboard
                </div>

                <span class="badge">
                    D
                </span>
            </div>

        </div>

        <div class="command-group">

            <h4>Actions</h4>

            <div class="command-item">
                <div class="left">
                    ➕ Create New File
                </div>

                <span class="badge">
                    N
                </span>
            </div>

            <div class="command-item">
                <div class="left">
                    ⚙ Settings
                </div>

                <span class="badge">
                    S
                </span>
            </div>

            <div class="command-item">
                <div class="left">
                    🔍 Search Workspace
                </div>

                <span class="badge">
                    F
                </span>
            </div>

        </div>

        <div class="footer">

            <span>↑ ↓ Navigate</span>
            <span>Enter Select</span>
            <span>Esc Close</span>

        </div>

    </div>

</div>

</body>
</html>
