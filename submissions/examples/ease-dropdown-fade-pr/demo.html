<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ease Dropdown Fade Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#f3f4f6; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div class="ease-dropdown-trigger" style="position:relative; display:inline-block;">
        <button style="padding:10px 20px; background:#3b82f6; color:white; border:none; border-radius:6px; cursor:pointer;">Settings Options Menu</button>
        <div class="ease-dropdown-fade-pr" style="position:absolute; top:45px; left:0; width:180px; background:white; border-radius:6px; box-shadow:0 4px 6px rgba(0,0,0,0.1); border:1px solid #e5e7eb; overflow:hidden;">
            <a href="#" style="display:block; padding:12px; color:#374151; text-decoration:none;">Edit Profile</a>
            <a href="#" style="display:block; padding:12px; color:#374151; text-decoration:none;">Account Details</a>
            <a href="#" style="display:block; padding:12px; color:#ef4444; text-decoration:none; border-top:1px solid #f3f4f6;">Logout</a>
        </div>
    </div>
</body>
</html>
