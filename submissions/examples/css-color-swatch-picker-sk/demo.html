<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Color Swatch Picker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="swatch-picker">
    <input type="radio" name="swatch" id="swatch-red" class="swatch-picker__input" checked>
    <label for="swatch-red" class="swatch-picker__swatch" style="--swatch: #e74c3c"></label>
    <input type="radio" name="swatch" id="swatch-blue" class="swatch-picker__input">
    <label for="swatch-blue" class="swatch-picker__swatch" style="--swatch: #3498db"></label>
    <input type="radio" name="swatch" id="swatch-green" class="swatch-picker__input">
    <label for="swatch-green" class="swatch-picker__swatch" style="--swatch: #2ecc71"></label>
    <input type="radio" name="swatch" id="swatch-yellow" class="swatch-picker__input">
    <label for="swatch-yellow" class="swatch-picker__swatch" style="--swatch: #f1c40f"></label>
    <input type="radio" name="swatch" id="swatch-purple" class="swatch-picker__input">
    <label for="swatch-purple" class="swatch-picker__swatch" style="--swatch: #9b59b6"></label>
    <div class="swatch-picker__preview" id="preview">Pick a color</div>
  </div>
</body>
</html>
