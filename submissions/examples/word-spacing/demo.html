<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Spacing Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item word-spacing-normal">.word-spacing-normal</div>
  <div class="demo-item word-spacing-wide">.word-spacing-wide</div>
  <div class="demo-item word-spacing-wider">.word-spacing-wider</div>
  <div class="demo-item word-spacing-widest">.word-spacing-widest</div>
  <div class="demo-item word-spacing-tight">.word-spacing-tight</div>
  <div class="demo-item word-spacing-none">.word-spacing-none</div>
</body>
</html>
