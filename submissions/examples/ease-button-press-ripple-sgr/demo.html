<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Press Ripple - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1 class="demo-title">Button Press Ripple</h1>
      <p class="demo-subtitle">
        Material-style ripples expanding outward exactly from the point of
        press, restricted to click events.
      </p>

      <div class="playground-card">
        <div class="button-container">
          <!-- Primary Ripple Button -->
          <button class="btn-press-ripple">Primary Indigo</button>

          <!-- Success Ripple Button -->
          <button class="btn-press-ripple btn-ripple-success">
            Emerald Success
          </button>

          <!-- Danger Ripple Button -->
          <button class="btn-press-ripple btn-ripple-danger">
            Rose Danger
          </button>

          <!-- Warning Ripple Button -->
          <button class="btn-press-ripple btn-ripple-warning">
            Amber Warning
          </button>

          <!-- Ghost Outline Ripple Button -->
          <button class="btn-press-ripple btn-ripple-outline">
            Ghost Outline
          </button>
        </div>

        <p class="ripple-instruction">
          Click and hold any button to see the press ripple position
        </p>
      </div>
    </div>

    <!-- Click Coordinator Script -->
    <script>
      const rippleButtons = document.querySelectorAll(".btn-press-ripple");

      rippleButtons.forEach((button) => {
        // Use pointerdown to capture both touch and mouse clicks instantly
        button.addEventListener("pointerdown", (e) => {
          const rect = button.getBoundingClientRect();

          // Calculate click coordinates relative to the button bounds
          const relativeX = e.clientX - rect.left;
          const relativeY = e.clientY - rect.top;

          // Set CSS custom properties on the pressed button
          button.style.setProperty("--ripple-x", `${relativeX}px`);
          button.style.setProperty("--ripple-y", `${relativeY}px`);
        });
      });
    </script>
  </body>
</html>
