<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix #30731 — core/tabs.js Memory Leak | EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="title-section">
      <h1>Fix #30731 — core/tabs.js Memory Leak</h1>
      <p>Demonstrates that DOM mutations no longer accumulate duplicate event listeners on <code>window</code>.</p>
    </div>

    <div class="demo-box">
      <div class="ease-tabs" id="test-tabs">
        <div class="ease-tabs-nav">
          <input type="radio" name="tabs" id="tab-1" class="ease-tab-input" checked />
          <label for="tab-1" class="ease-tab-label">Tab 1</label>
          <input type="radio" name="tabs" id="tab-2" class="ease-tab-input" />
          <label for="tab-2" class="ease-tab-label">Tab 2</label>
          <div class="ease-tab-underline"></div>
        </div>
        <div class="ease-tabs-content">
          <div class="ease-tab-panel">Content 1</div>
          <div class="ease-tab-panel">Content 2</div>
        </div>
      </div>

      <button class="btn" id="mutate-btn">Trigger DOM Mutation</button>
    </div>

    <div class="status-box" id="status">
      Mutations: 0
    </div>
  </div>

  <script>
    let mutationCount = 0;
    const btn = document.getElementById('mutate-btn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      mutationCount++;
      // Triggering a class toggle on body invokes the MutationObserver in tabs.js
      document.body.classList.toggle('mutation-marker-' + mutationCount);
      status.textContent = `Mutations Triggered: ${mutationCount} | With the fix, window resize listeners remain at exactly 1.`;
    });
  </script>
</body>
</html>
