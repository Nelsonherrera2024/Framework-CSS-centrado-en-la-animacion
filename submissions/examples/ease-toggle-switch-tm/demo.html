<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Toggle Switch - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <h1>Animated Toggle Switch</h1>
    <p class="description">Modern CSS-only toggle switches with sliding knob animations</p>

    <!-- Default toggle -->
    <div class="demo-section">
      <h2>Default</h2>
      <label class="ease-toggle">
        <input type="checkbox" class="ease-toggle-input" checked>
        <span class="ease-toggle-slider">
          <span class="ease-toggle-knob"></span>
        </span>
        <span class="ease-toggle-text">Enable notifications</span>
      </label>
      <label class="ease-toggle">
        <input type="checkbox" class="ease-toggle-input">
        <span class="ease-toggle-slider">
          <span class="ease-toggle-knob"></span>
        </span>
        <span class="ease-toggle-text">Dark mode</span>
      </label>
    </div>

    <!-- Large variant -->
    <div class="demo-section">
      <h2>Large</h2>
      <label class="ease-toggle ease-toggle-lg">
        <input type="checkbox" class="ease-toggle-input" checked>
        <span class="ease-toggle-slider">
          <span class="ease-toggle-knob"></span>
        </span>
        <span class="ease-toggle-text">Auto-save enabled</span>
      </label>
    </div>

    <!-- Small variant -->
    <div class="demo-section">
      <h2>Small</h2>
      <label class="ease-toggle ease-toggle-sm">
        <input type="checkbox" class="ease-toggle-input">
        <span class="ease-toggle-slider">
          <span class="ease-toggle-knob"></span>
        </span>
        <span class="ease-toggle-text">Compact view</span>
      </label>
    </div>

    <!-- Outline variant -->
    <div class="demo-section">
      <h2>Outline Variant</h2>
      <label class="ease-toggle ease-toggle-outline">
        <input type="checkbox" class="ease-toggle-input" checked>
        <span class="ease-toggle-slider">
          <span class="ease-toggle-knob"></span>
        </span>
        <span class="ease-toggle-text">Show online status</span>
      </label>
    </div>

    <!-- Disabled state -->
    <div class="demo-section">
      <h2>Disabled</h2>
      <label class="ease-toggle ease-toggle-lg">
        <input type="checkbox" class="ease-toggle-input" checked disabled>
        <span class="ease-toggle-slider">
          <span class="ease-toggle-knob"></span>
        </span>
        <span class="ease-toggle-text">Premium feature (disabled)</span>
      </label>
    </div>

    <!-- Row of toggles -->
    <div class="demo-section">
      <h2>Settings Panel</h2>
      <div class="ease-toggle-row">
        <div class="ease-toggle-row-item">
          <label class="ease-toggle ease-toggle-sm">
            <input type="checkbox" class="ease-toggle-input" checked>
            <span class="ease-toggle-slider"><span class="ease-toggle-knob"></span></span>
            <span class="ease-toggle-text">Email alerts</span>
          </label>
        </div>
        <div class="ease-toggle-row-item">
          <label class="ease-toggle ease-toggle-sm">
            <input type="checkbox" class="ease-toggle-input">
            <span class="ease-toggle-slider"><span class="ease-toggle-knob"></span></span>
            <span class="ease-toggle-text">SMS alerts</span>
          </label>
        </div>
        <div class="ease-toggle-row-item">
          <label class="ease-toggle ease-toggle-sm">
            <input type="checkbox" class="ease-toggle-input" checked>
            <span class="ease-toggle-slider"><span class="ease-toggle-knob"></span></span>
            <span class="ease-toggle-text">Push notifications</span>
          </label>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
