<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Name Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item anim-none">.anim-none</div>
  <div class="demo-item anim-fade-in">.anim-fade-in</div>
  <div class="demo-item anim-fade-out">.anim-fade-out</div>
  <div class="demo-item anim-slide-up">.anim-slide-up</div>
  <div class="demo-item anim-slide-down">.anim-slide-down</div>
  <div class="demo-item anim-slide-left">.anim-slide-left</div>
</body>
</html>
