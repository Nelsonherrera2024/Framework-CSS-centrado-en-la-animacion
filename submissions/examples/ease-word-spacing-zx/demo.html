<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Spacing Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Word Spacing</h1>
    <p class="note">Controls the spacing between words.</p>
    <div class="label">word-spacing-normal</div>
    <div class="demo-ws word-spacing-normal">
      The quick brown fox jumps over the lazy dog.
    </div>
    <div class="label">word-spacing-wide (0.25em)</div>
    <div class="demo-ws word-spacing-wide">
      The quick brown fox jumps over the lazy dog.
    </div>
    <div class="label">word-spacing-widest (1em)</div>
    <div class="demo-ws word-spacing-widest">
      The quick brown fox jumps over the lazy dog.
    </div>
  </body>
</html>
