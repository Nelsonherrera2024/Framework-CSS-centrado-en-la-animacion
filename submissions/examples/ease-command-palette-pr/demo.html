<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Palette Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="palette">

    <div class="search-box">
      <input type="text" placeholder="Search commands..." />
    </div>

    <div class="group">
      <h4>Navigation</h4>

      <div class="command">
        <span>Go to Dashboard</span>
        <kbd>⌘D</kbd>
      </div>

      <div class="command">
        <span>Open Settings</span>
        <kbd>⌘S</kbd>
      </div>
    </div>

    <div class="group">
      <h4>Actions</h4>

      <div class="command">
        <span>Create Project</span>
        <kbd>⌘N</kbd>
      </div>

      <div class="command">
        <span>Invite Member</span>
        <kbd>⌘I</kbd>
      </div>

      <div class="command">
        <span>View Analytics</span>
        <kbd>⌘A</kbd>
      </div>
    </div>

  </div>

</body>

</html>
