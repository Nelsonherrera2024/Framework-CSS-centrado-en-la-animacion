<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Spin Demo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>✨ Ease Spin Demo</h1>

<p>
Continuous 360° rotation utility with speed control and reverse mode.
</p>

<div class="container">

<div class="card">
<h3>Default</h3>
<div class="loader ease-spin"></div>
</div>

<div class="card">
<h3>Fast Spin</h3>
<div class="loader ease-spin fast"></div>
</div>

<div class="card">
<h3>Slow Spin</h3>
<div class="loader ease-spin slow"></div>
</div>

<div class="card">
<h3>Reverse</h3>
<div class="loader ease-spin-reverse"></div>
</div>

<div class="card">
<h3>Gear Icon</h3>

<div
class="icon ease-spin"
aria-label="Rotating gear icon"
>
⚙️
</div>

</div>

<div class="card">
<h3>Refresh Icon</h3>

<div
class="icon ease-spin-reverse"
aria-label="Reverse refresh icon"
>
↻
</div>

</div>

</div>

</body>
</html>
