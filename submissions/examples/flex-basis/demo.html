<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Basis Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item basis-none">.basis-none</div>
  <div class="demo-item basis-0">.basis-0</div>
  <div class="demo-item basis-1\/2">.basis-1\/2</div>
  <div class="demo-item basis-1\/3">.basis-1\/3</div>
  <div class="demo-item basis-2\/3">.basis-2\/3</div>
  <div class="demo-item basis-1\/4">.basis-1\/4</div>
</body>
</html>
