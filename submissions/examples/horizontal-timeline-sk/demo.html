<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Timeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="h-timeline">
    <div class="h-timeline__item">
      <div class="h-timeline__dot"></div>
      <div class="h-timeline__content">
        <h3 class="h-timeline__title">Step 1</h3>
        <p class="h-timeline__desc">Planning phase</p>
      </div>
      <div class="h-timeline__date">Q1 2024</div>
    </div>
    <div class="h-timeline__item h-timeline__item--active">
      <div class="h-timeline__dot"></div>
      <div class="h-timeline__content">
        <h3 class="h-timeline__title">Step 2</h3>
        <p class="h-timeline__desc">Development</p>
      </div>
      <div class="h-timeline__date">Q2 2024</div>
    </div>
    <div class="h-timeline__item">
      <div class="h-timeline__dot"></div>
      <div class="h-timeline__content">
        <h3 class="h-timeline__title">Step 3</h3>
        <p class="h-timeline__desc">Testing</p>
      </div>
      <div class="h-timeline__date">Q3 2024</div>
    </div>
    <div class="h-timeline__item">
      <div class="h-timeline__dot"></div>
      <div class="h-timeline__content">
        <h3 class="h-timeline__title">Step 4</h3>
        <p class="h-timeline__desc">Launch</p>
      </div>
      <div class="h-timeline__date">Q4 2024</div>
    </div>
  </div>
</body>
</html>
