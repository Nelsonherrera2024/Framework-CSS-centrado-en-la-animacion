<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Auto Columns Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item grid-auto-col-auto">.grid-auto-col-auto</div>
  <div class="demo-item grid-auto-col-min">.grid-auto-col-min</div>
  <div class="demo-item grid-auto-col-max">.grid-auto-col-max</div>
  <div class="demo-item grid-auto-col-fr">.grid-auto-col-fr</div>
  <div class="demo-item grid-auto-col-fixed">.grid-auto-col-fixed</div>
  <div class="demo-item grid-auto-col-100">.grid-auto-col-100</div>
</body>
</html>
