<link rel="stylesheet" href="./style.css" />

<div
  style="
    display: flex;
    gap: 24px;
    padding: 40px;
    font-family: sans-serif;
    align-items: center;
  "
>
  <button
    class="rotate-hover"
    style="
      padding: 12px 24px;
      border: 2px solid #6c63ff;
      background: white;
      border-radius: 8px;
      cursor: pointer;
    "
  >
    Hover me
  </button>
  <span class="rotate-hover" style="font-size: 2rem; cursor: default"
    >&#9733;</span
  >
  <div
    class="rotate-hover"
    style="
      width: 60px;
      height: 60px;
      background: #6c63ff;
      border-radius: 12px;
      cursor: pointer;
    "
  ></div>
</div>
