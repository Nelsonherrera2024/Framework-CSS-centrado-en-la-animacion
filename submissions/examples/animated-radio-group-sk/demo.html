<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Radio Group | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1 class="demo-title">Animated Radio Group</h1>
    <p class="demo-subtitle">Custom styled radio buttons with selection animations, multiple orientations, and themes.</p>

    <div class="demo-card">
      <h2 class="demo-label">Horizontal</h2>
      <div class="radio-group radio-group--horizontal">
        <label class="radio">
          <input type="radio" name="size" value="small" class="radio__input">
          <span class="radio__visual">
            <span class="radio__circle"></span>
            <span class="radio__text">Small</span>
          </span>
        </label>
        <label class="radio">
          <input type="radio" name="size" value="medium" class="radio__input" checked>
          <span class="radio__visual">
            <span class="radio__circle"></span>
            <span class="radio__text">Medium</span>
          </span>
        </label>
        <label class="radio">
          <input type="radio" name="size" value="large" class="radio__input">
          <span class="radio__visual">
            <span class="radio__circle"></span>
            <span class="radio__text">Large</span>
          </span>
        </label>
        <label class="radio">
          <input type="radio" name="size" value="xlarge" class="radio__input">
          <span class="radio__visual">
            <span class="radio__circle"></span>
            <span class="radio__text">X-Large</span>
          </span>
        </label>
      </div>
    </div>

    <div class="demo-card">
      <h2 class="demo-label">Vertical</h2>
      <div class="radio-group radio-group--vertical">
        <label class="radio">
          <input type="radio" name="plan" value="free" class="radio__input">
          <span class="radio__visual">
            <span class="radio__circle"></span>
            <span class="radio__text">Free Plan</span>
            <span class="radio__price">$0/mo</span>
          </span>
        </label>
        <label class="radio">
          <input type="radio" name="plan" value="pro" class="radio__input" checked>
          <span class="radio__visual">
            <span class="radio__circle"></span>
            <span class="radio__text">Pro Plan</span>
            <span class="radio__price">$29/mo</span>
          </span>
        </label>
        <label class="radio">
          <input type="radio" name="plan" value="enterprise" class="radio__input">
          <span class="radio__visual">
            <span class="radio__circle"></span>
            <span class="radio__text">Enterprise</span>
            <span class="radio__price">$99/mo</span>
          </span>
        </label>
      </div>
    </div>

    <div class="demo-card">
      <h2 class="demo-label">Card Style</h2>
      <div class="radio-group radio-group--horizontal">
        <label class="radio radio--card">
          <input type="radio" name="theme" value="light" class="radio__input" checked>
          <span class="radio__visual">
            <span class="radio__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </span>
            <span class="radio__text">Light</span>
          </span>
        </label>
        <label class="radio radio--card">
          <input type="radio" name="theme" value="dark" class="radio__input">
          <span class="radio__visual">
            <span class="radio__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </span>
            <span class="radio__text">Dark</span>
          </span>
        </label>
        <label class="radio radio--card">
          <input type="radio" name="theme" value="system" class="radio__input">
          <span class="radio__visual">
            <span class="radio__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </span>
            <span class="radio__text">System</span>
          </span>
        </label>
      </div>
    </div>
  </section>
</body>
</html>
