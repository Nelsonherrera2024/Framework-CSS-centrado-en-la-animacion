<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Spinners | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1 class="demo-title">Animated Spinners</h1>
    <p class="demo-subtitle">A collection of CSS-only loading spinners with smooth infinite animations.</p>
    <div class="spinner-grid">
      <div class="spinner-card">
        <h3 class="spinner-card__label">Circle</h3>
        <div class="spinner spinner--circle"></div>
      </div>
      <div class="spinner-card">
        <h3 class="spinner-card__label">Dots</h3>
        <div class="spinner spinner--dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="spinner-card">
        <h3 class="spinner-card__label">Ring</h3>
        <div class="spinner spinner--ring"></div>
      </div>
      <div class="spinner-card">
        <h3 class="spinner-card__label">Pulse</h3>
        <div class="spinner spinner--pulse"></div>
      </div>
      <div class="spinner-card">
        <h3 class="spinner-card__label">Hourglass</h3>
        <div class="spinner spinner--hourglass"></div>
      </div>
    </div>
  </section>
</body>
</html>
