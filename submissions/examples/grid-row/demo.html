<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Row Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item row-auto">.row-auto</div>
  <div class="demo-item row-span-1">.row-span-1</div>
  <div class="demo-item row-span-2">.row-span-2</div>
  <div class="demo-item row-span-3">.row-span-3</div>
  <div class="demo-item row-span-4">.row-span-4</div>
  <div class="demo-item row-span-full">.row-span-full</div>
</body>
</html>
