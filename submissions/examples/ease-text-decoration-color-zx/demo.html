<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Decoration Color Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Text Decoration Color</h1>
    <p class="note">
      Controls the color of text decoration lines independently of the text
      color.
    </p>
    <div class="label">deco-color-primary</div>
    <div class="demo-deco-color deco-color-primary">Primary underline</div>
    <div class="label">deco-color-red</div>
    <div class="demo-deco-color deco-color-red">Red underline</div>
    <div class="label">deco-color-blue</div>
    <div class="demo-deco-color deco-color-blue">Blue underline</div>
    <div class="label">deco-color-orange</div>
    <div class="demo-deco-color deco-color-orange">Orange underline</div>
  </body>
</html>
