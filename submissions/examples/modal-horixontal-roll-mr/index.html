<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Horizontal Roll Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Modal
</label>

<div class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <h2 id="modal-title">
            Cyberpunk Modal
        </h2>

        <p>
            Hello from the future.
        </p>

        <label for="modal-toggle" class="close-btn">
            Close
        </label>

    </div>

</div>

</body>
</html>
