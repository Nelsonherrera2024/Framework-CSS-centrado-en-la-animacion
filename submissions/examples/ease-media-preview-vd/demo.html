<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Media Preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="media-preview">

    <div class="thumbnail">

        <img
            src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200"
            alt="Media Thumbnail"
        >

        <div class="play-overlay">
            ▶
        </div>

        <div class="duration">
            03:42
        </div>

    </div>

    <div class="media-info">
        <h3>Building Modern UI Components</h3>
        <p>Hover over the thumbnail to preview the animation.</p>
    </div>

</div>

</body>
</html>
