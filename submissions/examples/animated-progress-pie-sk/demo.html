<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Progress Pie | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="pie__heading">Circular Progress</h1>
  <div class="pie__showcase">

    <div class="pie pie--25">
      <div class="pie__fill"></div>
      <span class="pie__label">25%</span>
    </div>

    <div class="pie pie--50">
      <div class="pie__fill"></div>
      <span class="pie__label">50%</span>
    </div>

    <div class="pie pie--75">
      <div class="pie__fill"></div>
      <span class="pie__label">75%</span>
    </div>

    <div class="pie pie--100">
      <div class="pie__fill"></div>
      <span class="pie__label">100%</span>
    </div>

  </div>

  <p class="pie__footnote">Color changes: red &lt; 50% · amber &lt; 80% · green ≥ 80%</p>
</body>
</html>
