<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Label Input</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="input-group">
    <input
      type="text"
      id="name"
      class="input-field"
      placeholder=" "
      required
    >
    <label for="name">Full Name</label>
  </div>

</body>
</html>
