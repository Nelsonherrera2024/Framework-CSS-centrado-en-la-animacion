<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Label Input — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Floating Label Input</h1>
  <p class="subtitle">A CSS form input with a label that floats above on focus — pure CSS.</p>
  <section><h2>Demo</h2><div class="form"><div class="field"><input type="text" id="name" placeholder=" "><label for="name">Full Name</label></div><div class="field"><input type="email" id="email" placeholder=" "><label for="email">Email Address</label></div></div></section>
  <section><h2>How It Works</h2><p>The label uses the <code>:focus</code> and <code>:not(:placeholder-shown)</code> selectors to transition from inside the input to a floating position above.</p></section>
</body>
</html>
