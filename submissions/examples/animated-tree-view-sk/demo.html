<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree View – Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #0f172a;
    }
    .sub {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <h1>Tree View</h1>
  <p class="sub">CSS-only expand/collapse with connecting lines</p>

  <nav class="tree-view">
    <ul class="tree-view__list">

      <!-- src (folder, expanded) -->
      <li class="tree-view__item">
        <input type="checkbox" class="tree-view__toggle" id="node-src" checked>
        <label class="tree-view__row" for="node-src">
          <span class="tree-view__arrow">&#9654;</span>
          <span class="tree-view__icon tree-view__icon--folder">&#128193;</span>
          <span class="tree-view__icon tree-view__icon--folder-open">&#128193;</span>
          <span class="tree-view__name">src</span>
        </label>
        <ul class="tree-view__children tree-view__list">

          <!-- components -->
          <li class="tree-view__item">
            <input type="checkbox" class="tree-view__toggle" id="node-components">
            <label class="tree-view__row" for="node-components">
              <span class="tree-view__arrow">&#9654;</span>
              <span class="tree-view__icon tree-view__icon--folder">&#128193;</span>
              <span class="tree-view__icon tree-view__icon--folder-open">&#128193;</span>
              <span class="tree-view__name">components</span>
            </label>
            <ul class="tree-view__children tree-view__list">
              <li class="tree-view__item tree-view__item--leaf">
                <label class="tree-view__row">
                  <span class="tree-view__icon tree-view__icon--file">&#128196;</span>
                  <span class="tree-view__name">Button.tsx</span>
                </label>
              </li>
              <li class="tree-view__item tree-view__item--leaf">
                <label class="tree-view__row">
                  <span class="tree-view__icon tree-view__icon--file">&#128196;</span>
                  <span class="tree-view__name">Card.tsx</span>
                </label>
              </li>
            </ul>
          </li>

          <!-- utils -->
          <li class="tree-view__item tree-view__item--leaf">
            <label class="tree-view__row">
              <span class="tree-view__icon tree-view__icon--file">&#128196;</span>
              <span class="tree-view__name">utils.ts</span>
            </label>
          </li>
          <li class="tree-view__item tree-view__item--leaf">
            <label class="tree-view__row">
              <span class="tree-view__icon tree-view__icon--file">&#128196;</span>
              <span class="tree-view__name">index.ts</span>
            </label>
          </li>

        </ul>
      </li>

      <!-- public -->
      <li class="tree-view__item tree-view__item--leaf">
        <label class="tree-view__row">
          <span class="tree-view__icon tree-view__icon--folder">&#128193;</span>
          <span class="tree-view__name">public</span>
        </label>
      </li>

      <!-- package.json -->
      <li class="tree-view__item tree-view__item--leaf">
        <label class="tree-view__row">
          <span class="tree-view__icon tree-view__icon--file">&#128196;</span>
          <span class="tree-view__name">package.json</span>
        </label>
      </li>

      <!-- README.md -->
      <li class="tree-view__item tree-view__item--leaf">
        <label class="tree-view__row">
          <span class="tree-view__icon tree-view__icon--file">&#128196;</span>
          <span class="tree-view__name">README.md</span>
        </label>
      </li>

    </ul>
  </nav>

</body>
</html>
