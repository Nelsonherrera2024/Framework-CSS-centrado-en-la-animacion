<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-mobile-pull-refresh-spinner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Pull to Refresh</h1>
    <p class="subtitle">Drag the list downward to see the spinner</p>

    <div class="refresh-wrapper" id="refreshWrapper">
      <div class="spinner" id="spinner" style="--pull-progress: 0"></div>
      <div class="content-area" id="contentArea">
        <div class="list-item">Item 1 — Latest updates</div>
        <div class="list-item">Item 2 — Notifications</div>
        <div class="list-item">Item 3 — Messages</div>
        <div class="list-item">Item 4 — Activity feed</div>
        <div class="list-item">Item 5 — Friend requests</div>
      </div>
    </div>

    <p class="hint" id="hint">↓ Pull down to refresh</p>
  </div>

  <script>
    const wrapper = document.getElementById('refreshWrapper');
    const spinner = document.getElementById('spinner');
    const hint = document.getElementById('hint');
    const content = document.getElementById('contentArea');
    let startY = 0, pulling = false, pulled = false;

    wrapper.addEventListener('touchstart', (e) => {
      if (content.scrollTop > 0) return;
      startY = e.touches[0].clientY;
      pulling = true;
    }, { passive: true });

    wrapper.addEventListener('touchmove', (e) => {
      if (!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if (dy < 0) { pulling = false; return; }
      const progress = Math.min(dy / 150, 1);
      spinner.style.setProperty('--pull-progress', progress);
      wrapper.classList.toggle('pulling', progress > 0.05);
      pulled = progress >= 0.8;
      hint.textContent = pulled ? 'Release to refresh' : '\u2193 Pull down to refresh';
    }, { passive: true });

    wrapper.addEventListener('touchend', () => {
      pulling = false;
      if (pulled) {
        wrapper.classList.add('refreshing');
        hint.textContent = 'Refreshing...';
        setTimeout(() => {
          wrapper.classList.remove('refreshing');
          spinner.style.setProperty('--pull-progress', 0);
          pulled = false;
          hint.textContent = '\u2193 Pull down to refresh';
        }, 1800);
      } else {
        spinner.style.setProperty('--pull-progress', 0);
        wrapper.classList.remove('pulling');
      }
    }, { passive: true });

    wrapper.addEventListener('mousedown', (e) => {
      if (content.scrollTop > 0) return;
      startY = e.clientY;
      pulling = true;
    });

    window.addEventListener('mousemove', (e) => {
      if (!pulling) return;
      const dy = e.clientY - startY;
      if (dy < 0) { pulling = false; return; }
      const progress = Math.min(dy / 150, 1);
      spinner.style.setProperty('--pull-progress', progress);
      wrapper.classList.toggle('pulling', progress > 0.05);
      pulled = progress >= 0.8;
      hint.textContent = pulled ? 'Release to refresh' : '\u2193 Pull down to refresh';
    });

    window.addEventListener('mouseup', () => {
      if (!pulling) return;
      pulling = false;
      if (pulled) {
        wrapper.classList.add('refreshing');
        hint.textContent = 'Refreshing...';
        setTimeout(() => {
          wrapper.classList.remove('refreshing');
          spinner.style.setProperty('--pull-progress', 0);
          pulled = false;
          hint.textContent = '\u2193 Pull down to refresh';
        }, 1800);
      } else {
        spinner.style.setProperty('--pull-progress', 0);
        wrapper.classList.remove('pulling');
      }
    });
  </script>
</body>
</html>
