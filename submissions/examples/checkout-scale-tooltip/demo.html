<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard Skew Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="saas-skew-tooltip-sandbox">
        <main class="analytics-card">
            <div class="analytics-header">
                <span class="card-title">Cache Allocation</span>
                <span class="status-indicator">Optimal</span>
            </div>

            <p class="analytics-body">
                Dynamic cache allocation indexes are executing operations within nominal parameters.
            </p>

            <div class="tooltip-wrapper">
                <button type="button" class="dashboard-action-btn" aria-describedby="dash-skew-tooltip">
                    Analyze Cache Clusters
                </button>

                <div id="dash-skew-tooltip" class="dashboard-tooltip" role="tooltip">
                    <span class="tooltip-category">Cluster Registry</span>
                    <p class="tooltip-text">L1/L2 hits are holding steady at 98.4% efficiency across active endpoints.
                    </p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
