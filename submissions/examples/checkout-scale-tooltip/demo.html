<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Checkout Scale-Hover Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="ems-scale-tooltip-sandbox">
        <main class="checkout-container">
            <div class="checkout-form-row">
                <div class="label-info-group">
                    <label for="cvv-input" class="field-label">Security Code (CVV)</label>
                    <div class="tooltip-wrapper">
                        <button type="button" class="checkout-info-trigger" aria-describedby="cvv-scale-tooltip"
                            aria-label="What is CVV?">?</button>
                        <div id="cvv-scale-tooltip" class="checkout-tooltip" role="tooltip">
                            <span class="tooltip-secure-badge">🔒 Secure Verification</span>
                            <p class="tooltip-body">For Visa/Mastercard, this is the 3-digit code printed on the
                                signature strip on the back of your card.</p>
                        </div>
                    </div>
                </div>
                <input type="text" id="cvv-input" class="checkout-field" placeholder="123" maxlength="4" pattern="\d*">
            </div>
        </main>
    </div>
</body>

</html>
