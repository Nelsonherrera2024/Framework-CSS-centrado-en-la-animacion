<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Glassmorphism Card - Component #186</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Premium Pricing Card -->
        <div class="premium-card">
            <div class="card-badge">✨ Premium</div>
            
            <div class="card-header">
                <h2>Pro Plan</h2>
                <p class="subtitle">Unlock all premium features</p>
            </div>

            <div class="card-price">
                <span class="currency">$</span>
                <span class="amount">29</span>
                <span class="period">/month</span>
            </div>

            <ul class="features-list">
                <li>✓ Unlimited projects</li>
                <li>✓ Advanced analytics</li>
                <li>✓ Priority support 24/7</li>
                <li>✓ Custom integrations</li>
                <li>✓ 500GB cloud storage</li>
            </ul>

            <button class="btn-primary">
                <span>Get Started Now</span>
                <span class="btn-icon">→</span>
            </button>

            <p class="footer-text">No credit card required • 14-day free trial</p>
        </div>
    </div>
</body>
</html>
