<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Glow - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-wrapper">
    <h2>Glowing Neon Buttons</h2>
    <div class="bg-demo">
      <button class="bg-btn bg-btn--purple">Purple</button>
      <button class="bg-btn bg-btn--blue">Blue</button>
      <button class="bg-btn bg-btn--green">Green</button>
      <button class="bg-btn bg-btn--red">Red</button>
      <button class="bg-btn bg-btn--cyan">Cyan</button>
    </div>
  </div>
</body>
</html>
