<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Wobble-Focus Modal (Creative Portfolio)</title>

    <!-- Embedded Stylesheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="demo-body">
    <!-- Main Hero Content -->
    <main class="portfolio-hero" aria-label="Portfolio welcome screen">
      <div class="portfolio-badge">Available for Work</div>
      <h1>We design and build premium digital products.</h1>
      <p>
        This demo showcases a pure CSS modal component utilizing an elegant
        **Wobble-Focus** interaction transition, styled to complement modern
        creative portfolios.
      </p>

      <!-- Open Modal Trigger -->
      <a
        href="#project-inquiry-modal"
        class="portfolio-btn"
        role="button"
        aria-haspopup="dialog"
        aria-controls="project-inquiry-modal"
      >
        Get in Touch
      </a>
