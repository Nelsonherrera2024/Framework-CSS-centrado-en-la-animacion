<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Anchor Positioning Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-container">
    <h1>CSS Anchor Positioning Tooltip</h1>
    <div class="tooltip-wrapper">
      <button class="trigger" id="trigger-btn">Hover me</button>
      <div class="tooltip ease-anchor-tooltip" role="tooltip">I'm positioned with CSS anchor()!</div>
    </div>
  </main>
</body>
</html>
