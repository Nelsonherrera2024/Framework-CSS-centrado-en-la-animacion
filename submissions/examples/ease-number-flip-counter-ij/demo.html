<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Number Flip Counter</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='counter-bg')r.style.setProperty('--counter-bg',t.value);if(t.name==='digit-color')r.style.setProperty('--digit-color',t.value);if(t.name==='flip-color')r.style.setProperty('--flip-color',t.value);if(t.name==='flip-duration')r.style.setProperty('--flip-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const d=document.querySelector('.digits');let v=1234;setInterval(()=>{v++;d.textContent=String(v).padStart(4,'0');d.style.animation='none';void d.offsetHeight;d.style.animation='flip var(--flip-duration,0.4s) ease-out'},2000)})</script>
<div class="container"><p class="title">Number Flip Counter</p>
<div class="counter"><div class="digits">1234</div></div>
<div class="controls"><label>BG: <input type="color" name="counter-bg" value="#2d2d44"></label><label>Digit: <input type="color" name="digit-color" value="#4ecdc4"></label><label>Flip: <input type="color" name="flip-color" value="#3a5a5a"></label><label>Speed: <input type="range" name="flip-duration" min="0.15" max="0.8" step="0.05" value="0.4"></label></div></div></body></html>
