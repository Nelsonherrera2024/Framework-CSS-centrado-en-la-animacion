<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlight Effect | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="spotlight-showcase-wrapper">
    <header class="showcase-header">
      <h1>Spotlight Cursor Effect</h1>
      <p>A cursor-aware radial light effect for <code>core/utilities.css</code>.</p>
    </header>

    <div class="demo-area">
      <div class="grid">
        
        <!-- Default (White) -->
        <div class="em-spotlight demo-card">
          <div class="card-content">
            <h3>Default Light</h3>
            <p>.em-spotlight</p>
          </div>
        </div>
        
        <!-- Blue Variant -->
        <div class="em-spotlight em-spotlight-blue demo-card">
          <div class="card-content">
            <h3>Blue Light</h3>
            <p>.em-spotlight.em-spotlight-blue</p>
          </div>
        </div>

        <!-- Purple Variant -->
        <div class="em-spotlight em-spotlight-purple demo-card">
          <div class="card-content">
            <h3>Purple Light</h3>
            <p>.em-spotlight.em-spotlight-purple</p>
          </div>
        </div>

        <!-- Gold Variant -->
        <div class="em-spotlight em-spotlight-gold demo-card">
          <div class="card-content">
            <h3>Gold Light</h3>
            <p>.em-spotlight.em-spotlight-gold</p>
          </div>
        </div>
        
      </div>
    </div>
    
  </div>

  <script>
    // JS needed to track cursor and update CSS variables
    document.querySelectorAll('.em-spotlight').forEach(el => {
      el.addEventListener('mousemove', e => {
        const rect = el.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        el.style.setProperty('--spotlight-x', `${x}px`);
        el.style.setProperty('--spotlight-y', `${y}px`);
      });
    });
  </script>
</body>
</html>
