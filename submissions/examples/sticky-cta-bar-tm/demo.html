<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sticky CTA</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Scroll down</h1>
    <p>The CTA bar will appear at the bottom when you scroll past the spacer.</p>
    <div class="spacer"></div>
    <div class="ease-sticky-cta" id="cta">
      <p>Ready to get started?</p>
      <button>Sign up free</button>
    </div>
  </div>
  <script>
    const cta = document.getElementById('cta');
    const io = new IntersectionObserver(([e]) => cta.classList.toggle('ease-sticky-cta-visible', !e.isIntersecting), { rootMargin: '-100px' });
    io.observe(document.querySelector('.spacer'));
  </script>
</body>
</html>
