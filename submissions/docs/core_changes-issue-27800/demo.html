<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-keyframe-wobble — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem; }
    @media (prefers-color-scheme: dark) { body { background: #0f172a; color: #f1f5f9; } }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 600px; margin: 0 auto 2.5rem; }
    .demo-section h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem; }
    .grid { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
    .box { width: 100px; height: 100px; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.75rem; }
    @keyframes wobble { 0%,100% { transform: rotate(0deg); } 20% { transform: rotate(-5deg); } 40% { transform: rotate(5deg); } 60% { transform: rotate(-2.5deg); } 80% { transform: rotate(2.5deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes pulse-soft { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.02); } }
    .wobble { background: linear-gradient(135deg, #6c5ce7, #a29bfe); animation: wobble 0.6s ease-in-out infinite; }
    .pulse { background: linear-gradient(135deg, #fd79a8, #fdcb6e); animation: pulse 2s ease-in-out infinite; }
    .pulse-soft { background: linear-gradient(135deg, #00b894, #00cec9); animation: pulse-soft 2.5s ease-in-out infinite; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 1.25rem; text-align: center; }
    @media (prefers-color-scheme: dark) { .card { background: #1e293b; border-color: #334155; } }
    .tag { display: inline-block; font-size: 0.6rem; font-family: monospace; background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2); border-radius: 999px; padding: 0.25em 0.75em; color: #6c63ff; margin-top: 0.75rem; }
  </style>
</head>
<body>
<header class="demo-header"><h1>ease-keyframe-wobble</h1><p>Wobble & pulse animation mixins</p></header>
<section class="demo-section">
  <h2>Animations</h2>
  <div class="grid">
    <div class="card"><div class="box wobble">Wobble</div><div class="tag">ease-anim-wobble</div></div>
    <div class="card"><div class="box pulse">Pulse</div><div class="tag">ease-anim-pulse</div></div>
    <div class="card"><div class="box pulse-soft">Soft</div><div class="tag">ease-anim-pulse-soft</div></div>
  </div>
</section>
</body>
</html>
