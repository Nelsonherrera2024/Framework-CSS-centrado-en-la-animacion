<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-card-lift — Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; color:#1e293b; padding:3rem 1.5rem; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; color:#f1f5f9; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.demo-section { max-width:600px; margin:0 auto 2.5rem; }
.demo-section h2 { font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6c63ff;margin-bottom:0.75rem; }
.grid { display:flex; gap:2rem; justify-content:center; flex-wrap:wrap; }
.card { width:180px; padding:1.5rem; background:white; border:1px solid #e2e8f0; border-radius:0.5rem; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.1); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease; cursor:pointer; }
@media (prefers-color-scheme:dark) { .card { background:#1e293b; border-color:#334155; } }
.card:hover.lift { transform:translateY(-8px); box-shadow:0 12px 28px rgba(0,0,0,0.15); }
.persp-wrap { perspective:800px; }
.card.tilt { transition:transform 0.3s ease; }
.persp-wrap:hover .card.tilt { transform:rotateX(-3deg) rotateY(5deg); }
.tag { display:inline-block; font-size:0.6rem; font-family:monospace; background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.2); border-radius:999px; padding:0.25em 0.75em; color:#6c63ff; margin-top:0.75rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-card-lift</h1><p>Card hover lift & perspective tilt mixins</p></header>
<section class="demo-section">
<h2>Effects</h2>
<div class="grid">
<div class="card lift"><h3 style="margin-bottom:0.5rem;">Lift</h3><p style="font-size:0.8rem;color:#64748b;">Hover to lift</p><div class="tag">ease-card-lift</div></div>
<div class="persp-wrap"><div class="card tilt"><h3 style="margin-bottom:0.5rem;">Tilt</h3><p style="font-size:0.8rem;color:#64748b;">Hover to tilt</p><div class="tag">ease-card-perspective</div></div></div>
</div>
</section>
</body>
</html>
