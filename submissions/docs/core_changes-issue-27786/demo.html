<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-grid-fit — Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; color:#1e293b; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; color:#f1f5f9; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.demo-section { max-width:800px; margin:0 auto 2.5rem; text-align:center; }
.demo-section h2 { font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6c63ff;margin-bottom:0.75rem; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.75rem; }
.item { background:white; border:1px solid #e2e8f0; border-radius:0.375rem; padding:1.25rem; text-align:center; }
@media (prefers-color-scheme:dark) { .item { background:#1e293b; border-color:#334155; } }
.item .num { font-size:0.8rem; font-weight:600; color:#6c63ff; }
.tag { display:inline-block; font-size:0.6rem; font-family:monospace; background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.2); border-radius:999px; padding:0.25em 0.75em; color:#6c63ff; margin-top:1rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-grid-fit</h1><p>Auto-fit grid generator mixin</p></header>
<section class="demo-section">
<h2>Auto-Fit Grid (min 140px)</h2>
<div class="grid">
<div class="item"><div class="num">01</div></div><div class="item"><div class="num">02</div></div><div class="item"><div class="num">03</div></div><div class="item"><div class="num">04</div></div><div class="item"><div class="num">05</div></div><div class="item"><div class="num">06</div></div><div class="item"><div class="num">07</div></div><div class="item"><div class="num">08</div></div>
</div>
<div class="tag">ease-grid-auto-fit(140px)</div>
<p style="color:#64748b;font-size:0.75rem;margin-top:0.5rem;">Resize browser — columns auto-adjust</p>
</section>
</body>
</html>
