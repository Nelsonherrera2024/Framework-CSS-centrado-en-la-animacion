<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shape Morph — EaseMotion CSS</title><link rel="stylesheet" href="style.css"><style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 2rem; background: #f9fafb; color: #111; text-align: center; }
h1 { margin-bottom: 2rem; }
.grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; place-items: center; }
code { background: #e5e7eb; padding: .15em .4em; border-radius: 4px; }
section { background: #fff; padding: 1.5rem; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
</style></head>
<body>
<h1>Shape Morphing</h1>
<section>
<div class="grid">
  <div><div class="ease-shape-morph ease-shape-circle">●</div><code>circle</code></div>
  <div><div class="ease-shape-morph ease-shape-triangle">▲</div><code>triangle</code></div>
  <div><div class="ease-shape-morph ease-shape-diamond">◆</div><code>diamond</code></div>
  <div><div class="ease-shape-morph ease-shape-hexagon">⬡</div><code>hexagon</code></div>
  <div><div class="ease-shape-morph ease-shape-star">★</div><code>star</code></div>
  <div><div class="ease-shape-morph ease-shape-pentagon">⬠</div><code>pentagon</code></div>
</div>
</section>
<section>
<h2>Hover to Morph</h2>
<div class="ease-shape-morph ease-shape-circle" id="morphDemo" style="margin:0 auto;cursor:pointer;--ease-morph-duration:0.6s" onmouseenter="this.className='ease-shape-morph ease-shape-star'" onmouseleave="this.className='ease-shape-morph ease-shape-circle'">★</div>
<p>Hover the shape to morph from circle to star.</p>
</section>
</body>
</html>
