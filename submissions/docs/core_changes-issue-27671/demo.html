<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-neumorphic — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #e0e5ec; color: #1e293b; padding: 3rem 1.5rem;
      display: flex; flex-direction: column; align-items: center;
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); color: #2d3436; }
    .demo-header p { color: #636e72; margin-top: 0.5rem; }
    .demo-section { max-width: 600px; margin: 0 auto 2.5rem; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c5ce7; margin-bottom: 0.75rem;
    }
    .grid { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
    .card {
      padding: 2rem; text-align: center; width: 200px;
      background: #e0e5ec; border-radius: 1rem;
    }
    .card-raised {
      box-shadow: 6px 6px 12px rgba(0,0,0,0.1), -6px -6px 12px rgba(255,255,255,0.8);
    }
    .card-pressed {
      box-shadow: inset 3px 3px 6px rgba(0,0,0,0.1), inset -3px -3px 6px rgba(255,255,255,0.8);
    }
    .card h3 { margin-bottom: 0.5rem; color: #2d3436; }
    .card p { font-size: 0.85rem; color: #636e72; }
    .tag {
      display: inline-block; font-size: 0.6rem; font-family: monospace;
      background: rgba(108,92,231,0.1); border: 1px solid rgba(108,92,231,0.2);
      border-radius: 999px; padding: 0.25em 0.75em; color: #6c5ce7; margin-top: 0.75rem;
    }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-neumorphic</h1>
  <p>Soft UI / Neumorphism shadow elevation SCSS mixins</p>
</header>
<section class="demo-section">
  <h2>Visual Demo</h2>
  <div class="grid">
    <div class="card card-raised">
      <h3>Raised</h3>
      <p>Convex — sits above the surface</p>
      <div class="tag">ease-neumorphic-raised</div>
    </div>
    <div class="card card-pressed">
      <h3>Pressed</h3>
      <p>Concave — pressed into surface</p>
      <div class="tag">ease-neumorphic-pressed</div>
    </div>
  </div>
  <p style="text-align:center;color:#636e72;font-size:0.8rem;margin-top:2rem;">SCSS mixins in <code>_mixins.scss</code> — import and use via <code>@use</code>.</p>
</section>
</body>
</html>
