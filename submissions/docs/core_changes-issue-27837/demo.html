<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-text-underline — Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; color:#1e293b; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; color:#f1f5f9; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.demo-section { max-width:500px; margin:0 auto 2.5rem; text-align:center; }
.demo-section h2 { font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6c63ff;margin-bottom:0.75rem; }
.highlight { background:linear-gradient(#fef08a,#fef08a); background-repeat:no-repeat; background-size:0% 0.3em; background-position:0 100%; transition:background-size 0.3s ease; font-size:1.5rem; font-weight:600; cursor:pointer; display:inline-block; }
.highlight:hover { background-size:100% 0.3em; }
.draw-underline { text-decoration:none; background:linear-gradient(#6c63ff,#6c63ff); background-repeat:no-repeat; background-size:0% 2px; background-position:0 100%; transition:background-size 0.4s ease; font-size:1.2rem; cursor:pointer; display:inline-block; }
.draw-underline:hover { background-size:100% 2px; }
.tag { display:inline-block; font-size:0.6rem; font-family:monospace; background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.2); border-radius:999px; padding:0.25em 0.75em; color:#6c63ff; margin-top:1.5rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-text-underline</h1><p>Highlight & underline draw mixins</p></header>
<section class="demo-section">
<h2>Hover each text</h2>
<div style="margin-bottom:2rem;">
<span class="highlight">Marker Highlight Effect</span>
</div>
<div>
<span class="draw-underline">Underline Draw Effect</span>
</div>
<div class="tag">ease-underline-highlight / ease-underline-draw</div>
</section>
</body>
</html>
