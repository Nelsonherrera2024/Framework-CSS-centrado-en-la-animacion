<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Animated Gradient — EaseMotion CSS</title><link rel="stylesheet" href="style.css"><style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: rgba(255,255,255,.85); backdrop-filter: blur(12px); padding: 2rem; border-radius: 16px; max-width: 400px; text-align: center; }
h1 { margin: 0 0 .5rem; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-top: 1rem; }
.demo-block { padding: 1rem; border-radius: 8px; color: #fff; font-weight: 600; font-size: .8rem; text-align: center; }
code { background: rgba(0,0,0,.1); padding: .15em .4em; border-radius: 4px; }
</style></head>
<body class="ease-gradient-animate ease-gradient-animate-ocean" style="display:flex;flex-direction:column;gap:2rem;padding:2rem">
<div class="card"><h1>Animated Gradient Background</h1><p>The background is a smooth animated gradient.</p></div>
<div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center">
<div class="demo-block ease-gradient-animate ease-gradient-animate-sunset" style="width:150px">Sunset</div>
<div class="demo-block ease-gradient-animate ease-gradient-animate-ocean" style="width:150px">Ocean</div>
<div class="demo-block ease-gradient-animate ease-gradient-animate-aurora" style="width:150px">Aurora</div>
<div class="demo-block ease-gradient-animate ease-gradient-animate-neon" style="width:150px">Neon</div>
<div class="demo-block ease-gradient-animate ease-gradient-animate-fast" style="width:150px">Fast</div>
<div class="demo-block ease-gradient-animate ease-gradient-animate-slow" style="width:150px">Slow</div>
</div>
</body>
</html>
