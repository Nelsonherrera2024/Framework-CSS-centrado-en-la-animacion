<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'unsafe-inline' 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;"
    />
    <!-- Favicon and App Icons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/site.webmanifest" />
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <title>EaseMotion CSS — Documentation</title>
    <meta
      name="description"
      content="Official documentation for EaseMotion CSS — the animation-first, human-readable CSS framework."
    />

    <link
      rel="stylesheet"
      href="easemotion.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to external docs.css -->
    <link rel="stylesheet" href="docs.css?v=2" />

    <!-- Apply stored theme before first paint to avoid flash -->
    <script>
      (function () {
        var t = localStorage.getItem("em-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>

    <style>
      /* ─────────────────────────────────────────────────────────
         Any extra page-specific overrides can go here.
         The main layout + mobile fix lives in docs.css
      ──────────────────────────────────────────────────────── */
    </style>
  </head>

  <body>
    <div class="ease-scroll-progress"></div>

    <!-- Scroll-to-top button -->
    <button
      class="ease-scroll-top ease-scroll-top--primary"
      id="scrollTopBtn"
      aria-label="Scroll to top"
      title="Back to top"
    >
      <svg class="ease-scroll-top__ring" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="20" />
      </svg>
      <svg
        class="ease-scroll-top__icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
      >
        <polyline points="18 15 12 9 6 15" />
      </svg>
    </button>

    <!-- ── Header ────────────────────────────────────────────── -->
    <header class="docs-header">
      <a href="index.html" class="docs-logo">
        <img src="assets/logo.svg" alt="EaseMotion CSS" class="docs-logo-img" />
      </a>

      <ul class="docs-header-links">
        <li><a href="#getting-started">Getting Started</a></li>
        <li><a href="#utilities">Utilities</a></li>
        <li><a href="#animations">Animations</a></li>
        <li><a href="animations-preview.html">Animation Preview</a></li>
        <li>
          <a href="animation-combo.html" class="ease-btn ease-nav-button"
            >Animation Builder</a
          >
        </li>
        <li>
          <a href="playground.html" class="ease-btn ease-nav-button"
            >Playground</a
          >
        </li>
        <li><a href="#components">Components</a></li>
        <li>
          <a
            href="https://discord.gg/hWSdGrccBU"
            target="_blank"
            rel="noopener noreferrer"
            >Discord</a
          >
        </li>
        <li>
          <a
            href="demo.html"
            class="ease-btn ease-btn-primary ease-btn-sm ease-btn-pill"
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              min-height: 48px;
              padding: 0 1.1rem;
              line-height: 1;
            "
            >Live Demo →</a
          >
        </li>
      </ul>

      <div class="header-actions">
        <button
          id="theme-toggle"
          class="theme-toggle-btn ease-hover-grow"
          aria-label="Toggle dark/light theme"
        >
          <svg
            class="sun-icon"
            viewBox="0 0 24 24"
            width="18"
            height="18"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.72" x2="5.64" y2="18.3"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg
            class="moon-icon"
            viewBox="0 0 24 24"
            width="18"
            height="18"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>

        <button
          class="sidebar-toggle"
          id="sidebarToggle"
          aria-label="Toggle sidebar"
        >
          ☰
        </button>
      </div>
    </header>
  </body>
</html>
